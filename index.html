<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blossom Boutique — Premium Handcrafted Jewelry</title>
    <style>
        /* Modern Elegant Styling Base */
        :root {
            --primary: #2c3e50;
            --accent: #d4af37; /* Gold */
            --bg: #faf9f6;
            --text: #333333;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text);
        }

        header {
            background-color: #ffffff;
            text-align: center;
            padding: 2rem 1rem;
            border-bottom: 1px solid #eaeaea;
        }

        header h1 {
            margin: 0;
            font-family: 'Georgia', serif;
            color: var(--primary);
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        header p {
            margin: 0.5rem 0 0;
            color: #7f8c8d;
            font-style: italic;
        }

        /* Filter Navigation Bar */
        .category-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 1.5rem 1rem;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eaeaea;
        }

        .cat-btn {
            background: #ffffff;
            border: 1px solid #ccc;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .cat-btn:hover, .cat-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Responsive Product Showcase Grid Layout */
        .products-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background-color: #f0f0f0;
        }

        .product-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-info h3 {
            margin: 0 0 0.5rem;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .product-info .category-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #95a5a6;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .product-info .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text);
            margin: auto 0 1rem 0;
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .whatsapp-btn:hover {
            background-color: #128C7E;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
            font-size: 0.9rem;
            background: #ffffff;
            border-top: 1px solid #eaeaea;
            margin-top: 4rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Blossom Boutique</h1>
        <p>Beautiful Handcrafted Jewelry Collections</p>
    </header>

    <div class="category-nav" id="category-menu"></div>

    <div class="products-container" id="product-grid"></div>

    <footer>
        <p>&copy; 2026 Blossom Boutique. Beautiful Handcrafted Jewelry.</p>
    </footer>

    <script>
        // 1. CONFIGURATION SYSTEM
        const AIRTABLE_BASE_ID = 'appHvuXwDC4SyFrft'; 
        const AIRTABLE_TOKEN = 'YOUR_ACTUAL_pat._TOKEN_HERE'; // <-- PASTE YOUR PERSONAL ACCESS TOKEN HERE
        const TABLE_NAME = 'products'; 
        const TARGET_WHATSAPP_NUMBER = '919442810288'; 

        const CATEGORIES = [
            { name: "All", emoji: "✨" },
            { name: "Bridal Jewellery", emoji: "💍" },
            { name: "Silver Jewellery", emoji: "💎" },
            { name: "General Jewellery", emoji: "💙" },
            { name: "Earrings", emoji: "✨" },
            { name: "Necklaces", emoji: "📿" },
            { name: "Bangles", emoji: "🥢" },
            { name: "Rings", emoji: "💍" },
            { name: "Bracelets", emoji: "💫" },
            { name: "Temple Jewellery", emoji: "🔱" },
            { name: "New Arrivals", emoji: "🌸" }
        ];

        let activeFilter = "All";
        let PRODUCTS = [];

        // 2. RENDERING THE FILTER MENU BAR
        function setupCategoryMenu() {
            const menuContainer = document.getElementById('category-menu');
            if (!menuContainer) return;

            menuContainer.innerHTML = '';
            CATEGORIES.forEach(cat => {
                const button = document.createElement('button');
                button.className = `cat-btn ${cat.name === activeFilter ? 'active' : ''}`;
                button.innerHTML = `${cat.emoji} ${cat.name}`;
                button.onclick = () => {
                    activeFilter = cat.name;
                    setupCategoryMenu(); // Redraw menu to switch active class look
                    displayProducts();   // Apply filter rules to display list
                };
                menuContainer.appendChild(button);
            });
        }

        // 3. DISPLAYING CARDS TO VISITOR FRONTEND Grid
        function displayProducts() {
            const grid = document.getElementById('product-grid');
            if (!grid) return;

            grid.innerHTML = '';

            // Filter down database items dynamically
            const filtered = activeFilter === "All" 
                ? PRODUCTS 
                : PRODUCTS.filter(p => p.category.toLowerCase() === activeFilter.toLowerCase());

            if (filtered.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #7f8c8d; padding: 3rem 0;">No items found in this collection right now.</p>`;
                return;
            }

            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';

                // Create clear pre-written text format for instant WhatsApp orders
                const textMessage = encodeURIComponent(`Hi Blossom Boutique! I want to order this product:\n\nName: ${product.name}\nCategory: ${product.category}\nPrice: ₹${product.price}`);
                const whatsappUrl = `https://wa.me/${TARGET_WHATSAPP_NUMBER}?text=${textMessage}`;

                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <div class="product-info">
                        <span class="category-label">${product.category}</span>
                        <h3>${product.name}</h3>
                        <div class="price">CNY ${product.price}</div>
                        <a href="${whatsappUrl}" target="_blank" class="whatsapp-btn">Order via WhatsApp</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 4. SYNC ENGINE FETCHING LIVE DATA FROM AIRTABLE MOBILE UPLOADS
        function loadInventoryFromAirtable() {
            const airtableUrl = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${TABLE_NAME}`;

            fetch(airtableUrl, {
                headers: {
                    'Authorization': `Bearer ${AIRTABLE_TOKEN}`
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Airtable response failure: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                // Map out Airtable row architecture cleanly back into our design arrays
                PRODUCTS = data.records.map(record => {
                    const fields = record.fields;

                    // Fallback configuration if phone upload has no image added yet
                    let finalImage = 'https://via.placeholder.com/300?text=No+Image+Available';
                    if (fields.image && fields.image.length > 0) {
                        finalImage = fields.image[0].url;
                    }

                    return {
                        name: fields.name || 'Handcrafted Jewellery Element',
                        price: parseInt(fields.price) || 0,
                        category: fields.category || 'General',
                        image: finalImage
                    };
                });

                // Run updates to user view components live
                displayProducts();
            })
            .catch(err => {
                console.error("Critical error mapping live inventory items:", err);
                document.getElementById('product-grid').innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: red;">Failed to sync live product catalog.</p>`;
            });
        }

        // INITIAL ENGINE IGNITION ON DOCUMENT MOUNT
        setupCategoryMenu();
        loadInventoryFromAirtable();
    </script>
</body>
</html>
